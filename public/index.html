<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>northbound</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cursor-glow"></div>
    <canvas id="canvas-stars"></canvas>

    <header class="hero">
        <div class="profile-wrapper">
            <div class="paint-reveal"></div>
            <img src="https://via.placeholder.com/180" alt="Profile" class="profile-pic">
        </div>
        
        <h1 class="logo reveal">northbound</h1>
        <div class="bio reveal">
            <p>Full-stack developer specializing in security tools and automation. Building the future of digital privacy one script at a time.</p>
        </div>
        <div class="scroll-down">↓</div>
    </header>

    <main class="content">
        <div class="card-grid" id="card-container"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
